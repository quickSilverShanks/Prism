services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: prism-backend

    command: >
      uvicorn backend.main:app
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app
      - ./data:/app/data

    depends_on:
      - postgres
      - milvus
      - ollama

    networks:
      - prism-network


  frontend:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: prism-frontend

    command: >
      streamlit run frontend/app.py
      --server.address=0.0.0.0
      --server.port=8501

    ports:
      - "8501:8501"

    env_file:
      - .env

    volumes:
      - .:/app
      - ./data:/app/data

    depends_on:
      - backend

    networks:
      - prism-network


  postgres:
    image: postgres:17
    container_name: prism-postgres

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - ./data/postgres:/var/lib/postgresql/data

    networks:
      - prism-network


  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: prism-etcd

    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000

    command: >
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd

    volumes:
      - ./data/etcd:/etcd

    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

    networks:
      - prism-network


  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: prism-minio

    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin

    command: minio server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - ./data/minio:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

    networks:
      - prism-network


  milvus:
    image: milvusdb/milvus:v2.6.13
    container_name: prism-milvus

    command: ["milvus", "run", "standalone"]

    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker

    ports:
      - "19530:19530"
      - "9091:9091"

    volumes:
      - ./data/milvus:/var/lib/milvus

    depends_on:
      - etcd
      - minio

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

    networks:
      - prism-network


  cloudbeaver:
    image: dbeaver/cloudbeaver:25.1.0
    container_name: prism-cloudbeaver

    ports:
      - "8978:8978"

    volumes:
      - ./data/cloudbeaver:/opt/cloudbeaver/workspace

    depends_on:
      - postgres

    networks:
      - prism-network


  attu:
    image: zilliz/attu:v2.6.5
    container_name: prism-attu

    ports:
      - "3000:3000"

    environment:
      MILVUS_URL: milvus:19530

    depends_on:
      - milvus

    networks:
      - prism-network


  ollama:
    image: ollama/ollama
    container_name: prism-ollama

    ports:
      - "11434:11434"

    volumes:
      - ./data/ollama:/root/.ollama

    networks:
      - prism-network


networks:
  prism-network:
    driver: bridge